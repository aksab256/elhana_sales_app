name: Android Build Test

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Java Development Kit (JDK)
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Install Dependencies
      run: flutter pub get

    # قمنا بتغيير البناء إلى --release لتجربة النسخة الفعلية أو يمكنك إبقاؤها --debug حسب رغبتك
    - name: Build APK (Check Firebase & Gradle Sync)
      run: flutter build apk --release

    # الخطوة الإضافية الهامة لرفع النسخة إلى الأرشيف (Artifact) لإمكانية التحميل المباشر
    - name: Upload APK to GitHub Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: release-apk
        path: build/app/outputs/flutter-apk/app-release.apk
